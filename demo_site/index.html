<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Kasa Açma</title>
    <style>
        body { 
            font-family: Arial; 
            background: #1e1e1e; 
            color: white; 
            text-align: center; 
            padding: 50px; 
        }
        h1 { color: #f39c12; }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            margin-top: 20px; 
            cursor: pointer; 
            background-color: #27ae60; 
            border: none; 
            border-radius: 5px; 
            color: white;
        }
        button:hover { background-color: #2ecc71; }
        #result { margin-top: 30px; font-size: 20px; }
        img { width: 200px; height: auto; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>CS2 Kasa Açma Sitesi</h1>
    <p>Butona tıklayarak bir CS2 kasası aç!</p>
    <button onclick="openCase()">Kasayı Aç</button>
    <div id="result"></div>
    <img id="caseImg" src="/vulcan.png" alt="Kasa Görseli">

    <script>
        const items = [
            "AWP | Dragon Lore",
            "AK-47 | Redline",
            "M4A4 | Howl",
            "Desert Eagle | Blaze",
            "USP-S | Kill Confirmed"
        ];

        function openCase() {
            const randomIndex = Math.floor(Math.random() * items.length);
            const item = items[randomIndex];
            document.getElementById("result").innerText = `Çıkan Skin: ${item}`;
        }
    </script>
</body>
</html>
